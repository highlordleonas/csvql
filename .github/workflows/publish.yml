name: publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact package version authorized for publication
        required: true
        type: string
      tag_object_oid:
        description: Exact annotated tag object ID authorized for publication
        required: true
        type: string
      peeled_commit_oid:
        description: Exact commit ID peeled from the annotated tag
        required: true
        type: string
      tag_ci_workflow_id:
        description: Exact successful tag-CI workflow ID
        required: true
        type: string
      tag_ci_run_id:
        description: Exact successful tag-CI run ID
        required: true
        type: string
      tag_ci_run_attempt:
        description: Exact successful tag-CI run attempt
        required: true
        type: string

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  EXPECTED_TAG: v1.0.5
  EXPECTED_VERSION: "1.0.5"

jobs:
  build-and-capture:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    env:
      ARTIFACT_PYTHON: "3.12.11"
    defaults:
      run:
        shell: bash
    steps:
      - name: Guard release tag
        run: |
          test "${GITHUB_REF}" = "refs/tags/${EXPECTED_TAG}"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "${EXPECTED_TAG}"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Fetch authoritative annotated release tag
        run: |
          git fetch --no-tags origin \
            "refs/tags/${EXPECTED_TAG}:refs/localql/verified-tags/${EXPECTED_TAG}"
      - name: Verify release and tag-CI identity
        env:
          AUTHORIZED_VERSION: ${{ inputs.version }}
          AUTHORIZED_TAG_OBJECT_OID: ${{ inputs.tag_object_oid }}
          AUTHORIZED_PEELED_COMMIT_OID: ${{ inputs.peeled_commit_oid }}
          AUTHORIZED_TAG_CI_WORKFLOW_ID: ${{ inputs.tag_ci_workflow_id }}
          AUTHORIZED_TAG_CI_RUN_ID: ${{ inputs.tag_ci_run_id }}
          AUTHORIZED_TAG_CI_RUN_ATTEMPT: ${{ inputs.tag_ci_run_attempt }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "${AUTHORIZED_VERSION}" = "${EXPECTED_VERSION}"
          [[ "${AUTHORIZED_TAG_OBJECT_OID}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${AUTHORIZED_PEELED_COMMIT_OID}" =~ ^[0-9a-f]{40}$ ]]
          [[ "${AUTHORIZED_TAG_CI_WORKFLOW_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${AUTHORIZED_TAG_CI_RUN_ID}" =~ ^[1-9][0-9]*$ ]]
          [[ "${AUTHORIZED_TAG_CI_RUN_ATTEMPT}" =~ ^[1-9][0-9]*$ ]]
          VERIFIED_TAG_REF="refs/localql/verified-tags/${EXPECTED_TAG}"
          test "$(git cat-file -t "${VERIFIED_TAG_REF}")" = "tag"
          test "$(git rev-parse "${VERIFIED_TAG_REF}^{tag}")" = "${AUTHORIZED_TAG_OBJECT_OID}"
          test "$(git rev-parse "${VERIFIED_TAG_REF}^{commit}")" = "${AUTHORIZED_PEELED_COMMIT_OID}"
          test "${GITHUB_SHA}" = "${AUTHORIZED_PEELED_COMMIT_OID}"
          git fetch --no-tags origin refs/heads/main:refs/remotes/origin/main
          git merge-base --is-ancestor "${AUTHORIZED_PEELED_COMMIT_OID}" refs/remotes/origin/main
          gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${AUTHORIZED_TAG_CI_RUN_ID}" \
            > tag-ci-run.json
          gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/${AUTHORIZED_TAG_CI_WORKFLOW_ID}" \
            > tag-ci-workflow.json
          gh api \
            "repos/${GITHUB_REPOSITORY}/actions/runs/${AUTHORIZED_TAG_CI_RUN_ID}/attempts/${AUTHORIZED_TAG_CI_RUN_ATTEMPT}/jobs?per_page=100" \
            > tag-ci-jobs.json
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          from pathlib import Path

          expected_jobs = {
              "test (ubuntu-latest, 3.11)",
              "test (ubuntu-latest, 3.12)",
              "test (ubuntu-latest, 3.13)",
              "test (ubuntu-latest, 3.14)",
              "test (macos-latest, 3.12)",
              "test (windows-latest, 3.12)",
          }
          run = json.loads(Path("tag-ci-run.json").read_text(encoding="utf-8"))
          workflow = json.loads(Path("tag-ci-workflow.json").read_text(encoding="utf-8"))
          jobs_payload = json.loads(Path("tag-ci-jobs.json").read_text(encoding="utf-8"))
          if not isinstance(run, dict):
              raise SystemExit("tag-CI run response is invalid")
          if not isinstance(workflow, dict):
              raise SystemExit("tag-CI workflow response is invalid")
          if not isinstance(jobs_payload, dict):
              raise SystemExit("tag-CI jobs response is invalid")

          expected = {
              "workflow_id": int(os.environ["AUTHORIZED_TAG_CI_WORKFLOW_ID"]),
              "run_id": int(os.environ["AUTHORIZED_TAG_CI_RUN_ID"]),
              "run_attempt": int(os.environ["AUTHORIZED_TAG_CI_RUN_ATTEMPT"]),
              "head_sha": os.environ["AUTHORIZED_PEELED_COMMIT_OID"],
          }
          observed = {
              "workflow_id": run.get("workflow_id"),
              "run_id": run.get("id"),
              "run_attempt": run.get("run_attempt"),
              "head_sha": run.get("head_sha"),
          }
          if observed != expected:
              raise SystemExit(f"tag-CI identity mismatch: {observed!r}")
          if workflow.get("id") != expected["workflow_id"]:
              raise SystemExit("authorized tag-CI workflow ID does not match")
          if workflow.get("path") != ".github/workflows/ci.yml":
              raise SystemExit("authorized tag-CI workflow path is not ci.yml")
          if run.get("event") != "push" or run.get("head_branch") != os.environ["EXPECTED_TAG"]:
              raise SystemExit("tag-CI event or tag ref mismatch")
          if run.get("status") != "completed" or run.get("conclusion") != "success":
              raise SystemExit("authorized tag-CI run did not succeed")
          jobs = jobs_payload.get("jobs")
          if not isinstance(jobs, list):
              raise SystemExit("tag-CI jobs response is invalid")
          if len(jobs) != len(expected_jobs):
              raise SystemExit(f"tag-CI job count mismatch: {len(jobs)}")
          if any(not isinstance(job, dict) for job in jobs):
              raise SystemExit("tag-CI jobs response contains an invalid job")
          job_names = [job.get("name") for job in jobs]
          if any(not isinstance(name, str) for name in job_names):
              raise SystemExit("tag-CI jobs response contains an invalid job name")
          observed_jobs = set(job_names)
          if observed_jobs != expected_jobs:
              raise SystemExit(f"tag-CI matrix mismatch: {observed_jobs!r}")
          if any(
              job.get("status") != "completed" or job.get("conclusion") != "success"
              for job in jobs
          ):
              raise SystemExit("one or more tag-CI jobs did not succeed")
          PY
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Set up Python
        run: uv python install "${ARTIFACT_PYTHON}"
      - name: Install dependencies
        run: uv sync --all-extras --all-groups --frozen
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run --all-extras mypy src
      - name: Test
        run: uv run --all-extras pytest
      - name: Build exact release bundle
        run: |
          set -euo pipefail
          mkdir -p release-bundle/artifacts release-bundle/evidence
          uv run --frozen --no-sync python scripts/audit_public_release.py --repo . --expected-repository "${GITHUB_REPOSITORY}" --candidate "${GITHUB_SHA}" --tree-only
          uv build --python "${ARTIFACT_PYTHON}" \
            --sdist --wheel \
            --no-create-gitignore \
            --out-dir release-bundle/artifacts \
            --build-constraints scripts/release-build-constraints.txt \
            --require-hashes
          uv run --frozen --no-sync python scripts/audit_package_contents.py \
            release-bundle/artifacts --expected-version "${EXPECTED_VERSION}"
          uv --version > release-bundle/evidence/uv-version.txt
          uv run --python "${ARTIFACT_PYTHON}" --no-sync python --version \
            > release-bundle/evidence/artifact-python-version.txt
          shasum -a 256 scripts/release-build-constraints.txt \
            > release-bundle/evidence/release-build-constraints.sha256
          REBUILD_DIR="${RUNNER_TEMP}/localql-constrained-rebuild"
          test ! -e "${REBUILD_DIR}"
          mkdir -- "${REBUILD_DIR}"
          uv build --wheel release-bundle/artifacts/localql-1.0.5.tar.gz \
            --python "${ARTIFACT_PYTHON}" \
            --no-create-gitignore \
            --out-dir "${REBUILD_DIR}" \
            --build-constraints scripts/release-build-constraints.txt \
            --require-hashes
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            verify-rebuild release-bundle/artifacts --expected-version "${EXPECTED_VERSION}" \
            --rebuilt-wheel "${REBUILD_DIR}/localql-1.0.5-py3-none-any.whl"
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            create-manifest release-bundle/artifacts --expected-version "${EXPECTED_VERSION}" \
            --manifest release-bundle/evidence/artifact-manifest.json \
            --sha256sums release-bundle/evidence/SHA256SUMS.txt \
            --source-commit "${GITHUB_SHA}" \
            --tag-name "${EXPECTED_TAG}" \
            --tag-object "${{ inputs.tag_object_oid }}" \
            --peeled-commit "${{ inputs.peeled_commit_oid }}" \
            --python-identity-file release-bundle/evidence/artifact-python-version.txt \
            --uv-identity-file release-bundle/evidence/uv-version.txt \
            --build-constraints-digest-file release-bundle/evidence/release-build-constraints.sha256
      - name: Capture immutable publication bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: localql-1.0.5-publish-bundle
          path: release-bundle
          if-no-files-found: error

  verify-captured-artifacts:
    needs: build-and-capture
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ARTIFACT_PYTHON: "3.12.11"
      VERIFICATION_DIR: ${{ github.workspace }}/verification-evidence
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ github.sha }}
      - name: Download immutable publication bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: localql-1.0.5-publish-bundle
          path: captured-bundle
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Set up Python
        run: uv python install "${ARTIFACT_PYTHON}"
      - name: Install verification dependencies
        run: uv sync --all-extras --all-groups --frozen
      - name: Prepare independent verifier context
        run: |
          set -euo pipefail
          mkdir -p "${VERIFICATION_DIR}"
          uv run --python "${ARTIFACT_PYTHON}" --no-sync python --version \
            > "${VERIFICATION_DIR}/python-identity.txt"
          uv --version > "${VERIFICATION_DIR}/uv-identity.txt"
          shasum -a 256 scripts/release-build-constraints.txt \
            > "${VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Verify captured bundle before artifact use
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/audit_package_contents.py \
            captured-bundle/artifacts --expected-version "${EXPECTED_VERSION}"
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            verify-manifest captured-bundle/artifacts --expected-version "${EXPECTED_VERSION}" \
            --manifest captured-bundle/evidence/artifact-manifest.json \
            --sha256sums captured-bundle/evidence/SHA256SUMS.txt \
            --source-commit "${GITHUB_SHA}" \
            --tag-name "${EXPECTED_TAG}" \
            --tag-object "${{ inputs.tag_object_oid }}" \
            --peeled-commit "${{ inputs.peeled_commit_oid }}" \
            --python-identity-file "${VERIFICATION_DIR}/python-identity.txt" \
            --uv-identity-file "${VERIFICATION_DIR}/uv-identity.txt" \
            --build-constraints-digest-file "${VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Check captured distribution metadata
        run: |
          set -euo pipefail
          uvx --from twine==6.2.0 twine check \
            captured-bundle/artifacts/localql-1.0.5-py3-none-any.whl \
            captured-bundle/artifacts/localql-1.0.5.tar.gz
      - name: Audit locked dependency paths
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/verify_dependency_audit.py \
            --evidence-dir "${VERIFICATION_DIR}/dependency-audit"
      - name: Run exact wheel and current-index sdist consumer smokes
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/verify_installed_artifacts.py \
            --wheel captured-bundle/artifacts/localql-1.0.5-py3-none-any.whl \
            --sdist captured-bundle/artifacts/localql-1.0.5.tar.gz \
            --core-requirements "${VERIFICATION_DIR}/dependency-audit/core-requirements.txt" \
            --tui-requirements "${VERIFICATION_DIR}/dependency-audit/tui-requirements.txt" \
            --work-dir "${RUNNER_TEMP}/localql-installed-smokes" \
            --expected-version "${EXPECTED_VERSION}" \
            --python "${ARTIFACT_PYTHON}" \
            > "${VERIFICATION_DIR}/installed-smokes.json"
      - name: Upload verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: localql-1.0.5-verification-evidence
          path: verification-evidence
          if-no-files-found: error

  pre-publish-verification:
    needs: verify-captured-artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      ARTIFACT_PYTHON: "3.12.11"
      PUBLISH_VERIFICATION_DIR: ${{ github.workspace }}/publish-verification
    defaults:
      run:
        shell: bash
    steps:
      - name: Guard release tag
        run: |
          test "${GITHUB_REF}" = "refs/tags/${EXPECTED_TAG}"
          test "${GITHUB_REF_TYPE}" = "tag"
          test "${GITHUB_REF_NAME}" = "${EXPECTED_TAG}"
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Download immutable publication bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: localql-1.0.5-publish-bundle
          path: release-bundle
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Set up Python
        run: uv python install "${ARTIFACT_PYTHON}"
      - name: Install verification dependencies
        run: uv sync --all-extras --all-groups --frozen
      - name: Prepare independent verifier context
        run: |
          set -euo pipefail
          mkdir -p "${PUBLISH_VERIFICATION_DIR}"
          uv run --python "${ARTIFACT_PYTHON}" --no-sync python --version \
            > "${PUBLISH_VERIFICATION_DIR}/python-identity.txt"
          uv --version > "${PUBLISH_VERIFICATION_DIR}/uv-identity.txt"
          shasum -a 256 scripts/release-build-constraints.txt \
            > "${PUBLISH_VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Verify downloaded publication bundle before publication
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/audit_package_contents.py \
            release-bundle/artifacts --expected-version "${EXPECTED_VERSION}"
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            verify-manifest release-bundle/artifacts --expected-version "${EXPECTED_VERSION}" \
            --manifest release-bundle/evidence/artifact-manifest.json \
            --sha256sums release-bundle/evidence/SHA256SUMS.txt \
            --source-commit "${GITHUB_SHA}" \
            --tag-name "${EXPECTED_TAG}" \
            --tag-object "${{ inputs.tag_object_oid }}" \
            --peeled-commit "${{ inputs.peeled_commit_oid }}" \
            --python-identity-file "${PUBLISH_VERIFICATION_DIR}/python-identity.txt" \
            --uv-identity-file "${PUBLISH_VERIFICATION_DIR}/uv-identity.txt" \
            --build-constraints-digest-file "${PUBLISH_VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Require version to be absent from PyPI
        run: |
          python - <<'PY'
          from __future__ import annotations

          import os
          from urllib.error import HTTPError, URLError
          from urllib.parse import quote
          from urllib.request import Request, urlopen

          version = os.environ["EXPECTED_VERSION"]
          url = f"https://pypi.org/pypi/localql/{quote(version, safe='')}/json"
          request = Request(
              url,
              headers={
                  "Accept": "application/json",
                  "X-Client-Name": "localql-release-check/1.0",
              },
          )
          try:
              with urlopen(request, timeout=15):
                  pass
          except HTTPError as exc:
              if exc.code == 404:
                  raise SystemExit(0) from None
              raise SystemExit(f"PyPI version check failed with HTTP {exc.code}") from exc
          except URLError as exc:
              raise SystemExit(f"PyPI version check failed: {exc.reason}") from exc
          raise SystemExit(f"localql {version} already exists; refusing publication")
          PY

  publish:
    needs: pre-publish-verification
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download immutable publication bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: localql-1.0.5-publish-bundle
          path: release-bundle
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
        with:
          packages-dir: release-bundle/artifacts/
          print-hash: true
          attestations: true

  post-publish-verification:
    needs: publish
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      ARTIFACT_PYTHON: "3.12.11"
      PUBLIC_READBACK_VERIFICATION_DIR: ${{ github.workspace }}/public-readback-verification
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
          ref: ${{ github.sha }}
      - name: Download original custody bundle
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: localql-1.0.5-publish-bundle
          path: original-custody
      - name: Install uv without caching
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "0.11.28"
          enable-cache: false
      - name: Prepare frozen verification environment
        run: |
          set -euo pipefail
          uv python install "${ARTIFACT_PYTHON}"
          uv sync --all-extras --all-groups --frozen
      - name: Read back exact public files and capture provenance
        id: verify_pypi_release
        timeout-minutes: 7
        run: |
          python - <<'PY'
          from __future__ import annotations

          import json
          import os
          import time
          from datetime import UTC, datetime
          from pathlib import Path
          from urllib.error import HTTPError, URLError
          from urllib.request import Request, urlopen

          PROJECT = "localql"
          VERSION = os.environ["EXPECTED_VERSION"]
          EXPECTED_FILES = {
              f"{PROJECT}-{VERSION}-py3-none-any.whl",
              f"{PROJECT}-{VERSION}.tar.gz",
          }
          VERIFICATION_DIR = Path("pypi-verification")
          READBACK_DIR = Path("public-readback-artifacts")
          MAX_ATTEMPTS = 8
          POLL_SECONDS = 10
          REQUEST_TIMEOUT_SECONDS = 10
          INTEGRITY_ACCEPT = "application/vnd.pypi.integrity.v1+json"
          MAX_COMPRESSED_ARTIFACT_BYTES = 5 * 1024 * 1024

          VERIFICATION_DIR.mkdir(parents=True, exist_ok=True)
          status_path = VERIFICATION_DIR / "verification-status.txt"
          status_path.write_text("PyPI verification started.\n", encoding="utf-8")

          def fetch_json(url: str, *, accept: str) -> dict[str, object] | None:
              request = Request(
                  url,
                  headers={
                      "Accept": accept,
                      "X-Client-Name": "localql-post-publish-verification/1.0",
                  },
              )
              try:
                  with urlopen(request, timeout=REQUEST_TIMEOUT_SECONDS) as response:
                      payload = json.load(response)
              except HTTPError as exc:
                  if exc.code == 404 or exc.code == 429 or 500 <= exc.code < 600:
                      return None
                  raise
              except (TimeoutError, URLError):
                  return None
              if not isinstance(payload, dict):
                  raise SystemExit(f"expected a JSON object from {url}")
              return payload

          def write_evidence(path: Path, payload: dict[str, object]) -> None:
              path.write_text(
                  json.dumps(payload, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )

          def release_file_records(entries: object) -> dict[str, str]:
              if not isinstance(entries, list):
                  raise SystemExit("release JSON urls field is not a list")
              records: dict[str, str] = {}
              for entry in entries:
                  if not isinstance(entry, dict):
                      raise SystemExit("release JSON contains a non-object file entry")
                  filename = entry.get("filename")
                  url = entry.get("url")
                  if not isinstance(filename, str) or Path(filename).name != filename:
                      raise SystemExit("release JSON contains an invalid filename")
                  if not isinstance(url, str) or not url.startswith("https://files.pythonhosted.org/"):
                      raise SystemExit(f"release JSON contains an invalid file URL for {filename}")
                  if filename in records:
                      raise SystemExit(f"release JSON repeats filename {filename}")
                  records[filename] = url
              return records

          def download_exact_file(filename: str, url: str) -> None:
              request = Request(
                  url,
                  headers={"X-Client-Name": "localql-public-readback/1.0"},
              )
              destination = READBACK_DIR / filename
              temp_path = READBACK_DIR / f".{filename}.partial"
              observed_size = 0
              try:
                  with urlopen(request, timeout=REQUEST_TIMEOUT_SECONDS) as response:
                      with temp_path.open("xb") as handle:
                          while True:
                              chunk = response.read(64 * 1024)
                              if not chunk:
                                  break
                              observed_size += len(chunk)
                              if observed_size > MAX_COMPRESSED_ARTIFACT_BYTES:
                                  raise SystemExit("public readback artifact exceeds the compressed size limit")
                              handle.write(chunk)
                          handle.flush()
                          os.fsync(handle.fileno())
                  os.replace(temp_path, destination)
              except FileExistsError:
                  raise SystemExit("public readback destination already exists") from None
              except OSError:
                  if temp_path.exists():
                      temp_path.unlink()
                  raise SystemExit("unable to store a public readback artifact") from None
              except SystemExit:
                  if temp_path.exists():
                      temp_path.unlink()
                  raise

          expected_publisher = {
              "kind": "GitHub",
              "repository": "highlordleonas/csvql",
              "workflow": "publish.yml",
              "environment": "pypi",
          }
          project_url = f"https://pypi.org/pypi/{PROJECT}/json"
          release_url = f"https://pypi.org/pypi/{PROJECT}/{VERSION}/json"
          verified = False
          last_issue = "PyPI metadata has not propagated"

          for attempt in range(1, MAX_ATTEMPTS + 1):
              project_metadata = fetch_json(project_url, accept="application/json")
              release_metadata = fetch_json(release_url, accept="application/json")

              if project_metadata is None or release_metadata is None:
                  last_issue = "project or release JSON is not available"
              else:
                  write_evidence(VERIFICATION_DIR / "pypi-project.json", project_metadata)
                  write_evidence(VERIFICATION_DIR / "pypi-release-1.0.5.json", release_metadata)
                  published_files = release_file_records(release_metadata.get("urls"))
                  if set(published_files) != EXPECTED_FILES:
                      last_issue = "release JSON filenames do not match the exact wheel and sdist"
                  elif any(
                      not published_files[filename].endswith(filename)
                      for filename in EXPECTED_FILES
                  ):
                      last_issue = "release JSON file URLs do not match the exact filenames"
                  else:
                      provenance_ready = True
                      for filename in sorted(EXPECTED_FILES):
                          provenance_url = (
                              f"https://pypi.org/integrity/{PROJECT}/{VERSION}/{filename}/provenance"
                          )
                          provenance = fetch_json(provenance_url, accept=INTEGRITY_ACCEPT)
                          if provenance is None:
                              provenance_ready = False
                              last_issue = f"provenance is not available for {filename}"
                              continue
                          write_evidence(VERIFICATION_DIR / f"provenance-{filename}.json", provenance)
                          bundles = provenance.get("attestation_bundles")
                          if not isinstance(bundles, list) or not bundles:
                              provenance_ready = False
                              last_issue = f"attestation bundles are missing for {filename}"
                              continue
                          for bundle in bundles:
                              if not isinstance(bundle, dict):
                                  provenance_ready = False
                                  last_issue = f"an attestation bundle is invalid for {filename}"
                                  continue
                              attestations = bundle.get("attestations")
                              if not isinstance(attestations, list) or not attestations:
                                  provenance_ready = False
                                  last_issue = f"an attestation bundle is empty for {filename}"
                                  continue
                              publisher = bundle.get("publisher")
                              if not isinstance(publisher, dict):
                                  provenance_ready = False
                                  last_issue = f"publisher identity is missing for {filename}"
                                  continue
                              observed_publisher = {
                                  key: publisher.get(key) for key in expected_publisher
                              }
                              if observed_publisher != expected_publisher:
                                  provenance_ready = False
                                  last_issue = f"publisher identity does not match for {filename}"
                                  continue

                      if provenance_ready:
                          READBACK_DIR.mkdir(parents=True, exist_ok=False)
                          for filename in sorted(EXPECTED_FILES):
                              download_exact_file(filename, published_files[filename])
                          if {path.name for path in READBACK_DIR.iterdir()} != EXPECTED_FILES:
                              raise SystemExit(
                                  "public readback directory does not contain the exact wheel and sdist"
                              )
                          summary = {
                              "project": PROJECT,
                              "version": VERSION,
                              "verified_at": datetime.now(UTC).isoformat(),
                              "published_files": published_files,
                              "publisher_identity": expected_publisher,
                              "publication_run_id": os.environ["GITHUB_RUN_ID"],
                              "publication_run_attempt": os.environ["GITHUB_RUN_ATTEMPT"],
                              "exact_release_json_filenames_and_urls_verified": True,
                              "exact_public_files_downloaded": True,
                              "provenance_and_non_empty_attestation_evidence_captured": True,
                              "cryptographic_attestation_verification_performed": False,
                          }
                          write_evidence(VERIFICATION_DIR / "verification-summary.json", summary)
                          status_path.write_text(
                              "PyPI release JSON filenames and file URLs verified; exact public files downloaded; provenance and non-empty attestation evidence captured. No cryptographic attestation verification was performed.\n",
                              encoding="utf-8",
                          )
                          verified = True
                          break

              if attempt < MAX_ATTEMPTS:
                  print(
                      f"PyPI verification attempt {attempt}/{MAX_ATTEMPTS} incomplete: "
                      f"{last_issue}; retrying in {POLL_SECONDS}s"
                  )
                  time.sleep(POLL_SECONDS)

          if not verified:
              status_path.write_text(
                  f"PyPI verification failed after {MAX_ATTEMPTS} attempts: {last_issue}.\n",
                  encoding="utf-8",
              )
              raise SystemExit(status_path.read_text(encoding="utf-8").strip())
          PY
      - name: Prepare independent public readback verifier context
        run: |
          set -euo pipefail
          mkdir -p "${PUBLIC_READBACK_VERIFICATION_DIR}"
          uv run --python "${ARTIFACT_PYTHON}" --no-sync python --version \
            > "${PUBLIC_READBACK_VERIFICATION_DIR}/python-identity.txt"
          uv --version > "${PUBLIC_READBACK_VERIFICATION_DIR}/uv-identity.txt"
          shasum -a 256 scripts/release-build-constraints.txt \
            > "${PUBLIC_READBACK_VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Verify public readback against original custody
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/audit_package_contents.py \
            public-readback-artifacts --expected-version "${EXPECTED_VERSION}"
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            verify-manifest public-readback-artifacts --expected-version "${EXPECTED_VERSION}" \
            --manifest original-custody/evidence/artifact-manifest.json \
            --sha256sums original-custody/evidence/SHA256SUMS.txt \
            --source-commit "${GITHUB_SHA}" \
            --tag-name "${EXPECTED_TAG}" \
            --tag-object "${{ inputs.tag_object_oid }}" \
            --peeled-commit "${{ inputs.peeled_commit_oid }}" \
            --python-identity-file "${PUBLIC_READBACK_VERIFICATION_DIR}/python-identity.txt" \
            --uv-identity-file "${PUBLIC_READBACK_VERIFICATION_DIR}/uv-identity.txt" \
            --build-constraints-digest-file "${PUBLIC_READBACK_VERIFICATION_DIR}/release-build-constraints.sha256"
      - name: Audit locked dependency paths for post-public smoke
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/verify_dependency_audit.py \
            --evidence-dir "${PUBLIC_READBACK_VERIFICATION_DIR}/dependency-audit"
      - name: Run exact-byte wheel and current-index sdist consumer smokes
        id: verify_exact_public_release_smoke
        run: |
          set -euo pipefail
          uv run --frozen --no-sync python scripts/verify_installed_artifacts.py \
            --wheel public-readback-artifacts/localql-1.0.5-py3-none-any.whl \
            --sdist public-readback-artifacts/localql-1.0.5.tar.gz \
            --core-requirements "${PUBLIC_READBACK_VERIFICATION_DIR}/dependency-audit/core-requirements.txt" \
            --tui-requirements "${PUBLIC_READBACK_VERIFICATION_DIR}/dependency-audit/tui-requirements.txt" \
            --work-dir "${RUNNER_TEMP}/localql-post-publish-smoke" \
            --expected-version 1.0.5 \
            --python 3.12.11 \
            > "${PUBLIC_READBACK_VERIFICATION_DIR}/installed-smokes.json"
      - name: Record failed verification outcome
        if: always() && (steps.verify_pypi_release.outcome != 'success' || steps.verify_exact_public_release_smoke.outcome != 'success')
        env:
          PROVENANCE_OUTCOME: ${{ steps.verify_pypi_release.outcome }}
          EXACT_PUBLIC_RELEASE_SMOKE_OUTCOME: ${{ steps.verify_exact_public_release_smoke.outcome }}
        run: |
          set -euo pipefail
          mkdir -p pypi-verification
          printf '%s\n' \
            'PyPI post-publish verification failed, timed out, or skipped before completion. Inspect workflow logs and captured partial evidence. No cryptographic attestation verification was performed.' \
            "Provenance verification outcome: ${PROVENANCE_OUTCOME}." \
            "Exact public installed-artifact smoke outcome: ${EXACT_PUBLIC_RELEASE_SMOKE_OUTCOME}." \
            > pypi-verification/verification-outcome.txt
          cp pypi-verification/verification-outcome.txt \
            pypi-verification/verification-status.txt
      - name: Upload PyPI verification evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: localql-1.0.5-pypi-verification
          path: pypi-verification
          if-no-files-found: error

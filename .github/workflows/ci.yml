name: ci

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  ARTIFACT_PYTHON: "3.12.11"

jobs:
  test:
    runs-on: ${{ matrix.os }}
    env:
      UV_PYTHON: ${{ matrix.python-version }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            python-version: "3.11"
          - os: ubuntu-latest
            python-version: "3.12"
          - os: ubuntu-latest
            python-version: "3.13"
          - os: ubuntu-latest
            python-version: "3.14"
          - os: macos-latest
            python-version: "3.12"
          - os: windows-latest
            python-version: "3.12"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Install uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86
        with:
          version: "0.11.28"
          enable-cache: true
      - name: Set up Python
        run: uv python install ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --all-extras --frozen
      - name: Verify pull request test merge
        if: github.event_name == 'pull_request'
        env:
          PR_BASE_OID: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_OID: ${{ github.event.pull_request.head.sha }}
          PR_TEST_MERGE_OID: ${{ github.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse --verify HEAD^{commit})" = "${PR_TEST_MERGE_OID}"
          test "$(git rev-parse --verify HEAD^1)" = "${PR_BASE_OID}"
          test "$(git rev-parse --verify HEAD^2)" = "${PR_HEAD_OID}"
      - name: Baseline truth
        run: |
          pwd -P
          git status --short --branch
          git log -1 --oneline
          git remote -v
          git tag --points-at HEAD
          uv --version
          uv run python --version
          uv run --all-extras csvql --version
      - name: Check formatting
        run: uv run ruff format --check .
      - name: Lint
        run: uv run ruff check .
      - name: Type check
        run: uv run --all-extras mypy src
      - name: Test
        run: uv run --all-extras pytest
      - name: Verify exact release artifacts
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: |
          set -euo pipefail
          uv python install "${ARTIFACT_PYTHON}"
          mkdir -p output/ci-release-dist
          uv build --python "${ARTIFACT_PYTHON}" --sdist --wheel \
            --out-dir output/ci-release-dist \
            --build-constraints scripts/release-build-constraints.txt \
            --require-hashes
          uv run --frozen --no-sync python scripts/audit_package_contents.py \
            output/ci-release-dist --expected-version 1.0.4
          uv run --frozen --no-sync python scripts/verify_release_artifacts.py \
            output/ci-release-dist --expected-version 1.0.4 \
            --manifest output/ci-release-artifact-manifest.json
          uvx --from twine==6.2.0 twine check \
            output/ci-release-dist/localql-1.0.4-py3-none-any.whl \
            output/ci-release-dist/localql-1.0.4.tar.gz
          uv --version > output/ci-release-uv-version.txt
          uv run --python "${ARTIFACT_PYTHON}" --no-sync python --version \
            > output/ci-release-python-version.txt
          shasum -a 256 scripts/release-build-constraints.txt \
            > output/ci-release-build-constraints.sha256

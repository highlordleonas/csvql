name: Feature request
description: Suggest a focused improvement for LocalQL
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: users
    attributes:
      label: User impact
      description: Who would benefit, and how would their workflow improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed scope
      description: What change would you like to see?
    validations:
      required: true
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility
      description: Could this change affect commands, configuration, output, or existing workflows?
    validations:
      required: true
  - type: textarea
    id: tests
    attributes:
      label: Tests
      description: What behavior should be covered or checked?
    validations:
      required: false
  - type: textarea
    id: docs
    attributes:
      label: Documentation
      description: Which user-facing documentation would need an update?
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Add screenshots or terminal output when they clarify the request.
    validations:
      required: false

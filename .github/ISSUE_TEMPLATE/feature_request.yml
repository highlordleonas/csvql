name: Feature request
description: Suggest a focused LocalQL improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "Released LocalQL v1 is local-first and CSV-focused. Future structured-source work must name a maintainer-approved, repository-adopted roadmap milestone and still requires separate implementation approval."
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What current workflow or approved roadmap problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
    validations:
      required: true
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: This stays within released v1 scope or names a maintainer-approved, repository-adopted future roadmap milestone.
          required: true
        - label: This does not require a web app, NLP execution, hidden cache, sandbox-safe SQL claim, or unapproved connector behavior.
          required: true

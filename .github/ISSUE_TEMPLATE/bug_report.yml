name: Bug report
description: Report a reproducible LocalQL problem
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve LocalQL. Please include a small local CSV example when possible."
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the exact command you ran.
      render: shell
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the full error output.
      render: text
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: LocalQL version
      description: Run `csvql --version`.
    validations:
      required: true
  - type: input
    id: python
    attributes:
      label: Python version
      description: Run `python --version`.
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: Operating system
    validations:
      required: true
